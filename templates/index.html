<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chart</title>
</head>
<body>
    <div>
    <canvas id="myChart"></canvas>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <script>
    const ctx = document.getElementById('myChart');

    async function prepare_chart() {
        try{
        const response = await fetch('/api/skills')
        if (!response.ok){
            console.log(`HTML STATUS ERROR: ${response.status}`)
            throw new Error(`HTML STATUS ERROR: ${response.status}`)
        } 
        const rawData = await response.json()
        const requiredData = rawData.slice(0,20)
        const chartLabel = requiredData.map(item => item.skill)
        const chartValues = requiredData.map(item => item.count)
        new Chart(ctx, {
            type: 'bar',
            data: {
            labels: chartLabel,
            datasets: [{
                label: '# of Mentions',
                data: chartValues,
                borderWidth: 1
            }]
            },
            options: {
            scales: {
                y: {
                beginAtZero: true
                }
            }
            }
        });
        console.log("Data retrieved successfully:", rawData)
        }catch (error){
            console.log("Fetch operation failed:",error)
        }
    }

    prepare_chart()
    </script>

</body>
</html>
